<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Lunar Descent</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0c10;
            color: #66fcf1;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            border: 2px solid #45a29e;
            background: #121820;
            box-shadow: 0 0 30px rgba(69, 162, 158, 0.15);
            border-radius: 4px;
        }
        #ui-panel {
            display: flex;
            justify-content: space-between;
            width: 800px;
            margin-top: 15px;
            padding: 15px;
            background: rgba(31, 40, 51, 0.9);
            border: 1px solid #45a29e;
            box-sizing: border-box;
            border-radius: 4px;
        }
        .telemetry { width: 45%; }
        .controls { width: 45%; text-align: right; }
        p { margin: 4px 0; font-size: 14px; }
        .highlight { color: #ffffff; font-weight: bold; }
        .warning { color: #ffb347; }
        .danger { color: #ff4c4c; font-weight: bold; }
        .success { color: #45a29e; font-weight: bold; }
        button {
            background-color: #45a29e; color: #0b0c10;
            border: none; padding: 8px 16px; margin-top: 10px;
            font-family: 'Consolas', monospace; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: #66fcf1; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div id="ui-panel">
        <div class="telemetry">
            <p>V-Speed : <span id="v-speed">0.00</span> m/s</p>
            <p>H-Speed : <span id="h-speed">0.00</span> m/s</p>
            <p>Angle   : <span id="angle-disp">0</span>°</p>
            <p>Fuel    : <span id="fuel-disp">100</span>%</p>
            <p id="status" class="highlight">STATUS: NOMINAL</p>
        </div>
        <div class="controls">
            <p><span class="highlight">[PANAH ATAS / W]</span> Main Engine</p>
            <p><span class="highlight">[KIRI / A]</span> Rotasi Kiri</p>
            <p><span class="highlight">[KANAN / D]</span> Rotasi Kanan</p>
            <button onclick="initGame()">RESET SIMULASI</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Konstanta Fisika
        const GRAVITY = 0.02;
        const THRUST_POWER = 0.06;
        const ROTATION_SPEED = 0.04;
        const MAX_LANDING_SPEED_V = 1.2;
        const MAX_LANDING_SPEED_H = 0.8;
        const MAX_LANDING_ANGLE = 15; // Derajat

        let lander, terrain, particles, stars, gameActive, padX, padWidth;
        let keys = { up: false, left: false, right: false };

        // Event Listeners
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = true;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        });

        function generateTerrain() {
            terrain = [];
            padWidth = 100;
            padX = 100 + Math.random() * (canvas.width - 300); // Pad muncul acak di tengah
            let padY = canvas.height - 50 - Math.random() * 100;

            let currentY = canvas.height / 2 + Math.random() * 100;
            
            for (let x = 0; x <= canvas.width; x += 40) {
                if (x >= padX - 20 && x <= padX + padWidth + 20) {
                    // Paksa permukaan menjadi rata di area landing pad
                    terrain.push({ x: x, y: padY });
                } else {
                    // Generate pegunungan acak
                    currentY += (Math.random() - 0.5) * 80;
                    // Batasi ketinggian gunung
                    if (currentY > canvas.height - 20) currentY = canvas.height - 20;
                    if (currentY < canvas.height / 2) currentY = canvas.height / 2;
                    terrain.push({ x: x, y: currentY });
                }
            }
            // Pastikan titik terakhir mencapai ujung canvas
            terrain.push({ x: canvas.width, y: currentY });
        }

        // Interpolasi linear untuk mendapatkan ketinggian tanah di posisi X berapapun
        function getSurfaceY(x) {
            for (let i = 0; i < terrain.length - 1; i++) {
                if (x >= terrain[i].x && x <= terrain[i+1].x) {
                    let t = (x - terrain[i].x) / (terrain[i+1].x - terrain[i].x);
                    return terrain[i].y + t * (terrain[i+1].y - terrain[i].y);
                }
            }
            return canvas.height;
        }

        function initGame() {
            lander = {
                x: 100, y: 50,
                vx: 1.5, vy: 0, // Diberi kecepatan awal horizontal
                angle: 0, fuel: 100,
                width: 20, height: 24
            };
            particles = [];
            stars = Array.from({length: 100}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5
            }));
            gameActive = true;
            generateTerrain();
            updateUI(true);
        }

        function createExhaust() {
            // Partikel didorong ke arah berlawanan dari posisi moncong (angle)
            let emitX = lander.x - Math.sin(lander.angle) * (lander.height/2);
            let emitY = lander.y + Math.cos(lander.angle) * (lander.height/2);
            
            particles.push({
                x: emitX + (Math.random() - 0.5) * 5,
                y: emitY + (Math.random() - 0.5) * 5,
                vx: -Math.sin(lander.angle) * 2 + (Math.random() - 0.5),
                vy: Math.cos(lander.angle) * 2 + (Math.random() - 0.5),
                life: 1.0
            });
        }

        function update() {
            if (!gameActive) return;

            // Kontrol Rotasi
            if (keys.left) lander.angle -= ROTATION_SPEED;
            if (keys.right) lander.angle += ROTATION_SPEED;

            // Vektor Thrust (Trigonometri)
            if (keys.up && lander.fuel > 0) {
                // Math.sin/cos digunakan untuk memecah gaya dorong ke sumbu X dan Y
                lander.vx += Math.sin(lander.angle) * THRUST_POWER;
                lander.vy -= Math.cos(lander.angle) * THRUST_POWER; // Negatif karena Y di canvas terbalik
                lander.fuel -= 0.15;
                createExhaust();
            }

            // Fisika Dasar
            lander.vy += GRAVITY;
            lander.x += lander.vx;
            lander.y += lander.vy;

            // Update Partikel
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Batas layar horizontal (wrap around)
            if (lander.x > canvas.width) lander.x = 0;
            if (lander.x < 0) lander.x = canvas.width;

            checkCollision();
            updateUI();
        }

        function checkCollision() {
            // Titik tumbukan dihitung dari bagian bawah lander
            let surfaceY = getSurfaceY(lander.x);
            let landerBottomY = lander.y + (lander.height / 2); // Karena x,y kita jadikan titik tengah saat render

            if (landerBottomY >= surfaceY) {
                lander.y = surfaceY - (lander.height / 2);
                gameActive = false;
                evaluateLanding();
            }
        }

        function evaluateLanding() {
            let onPad = (lander.x >= padX && lander.x <= padX + padWidth);
            let degree = Math.abs(lander.angle * (180 / Math.PI)) % 360;
            if (degree > 180) degree = 360 - degree; // Normalisasi sudut

            let statusEl = document.getElementById('status');
            
            if (!onPad) {
                statusEl.innerHTML = 'STATUS: <span class="danger">HANCUR! Mendarat di medan berbatu.</span>';
                return;
            }

            if (lander.vy > MAX_LANDING_SPEED_V || Math.abs(lander.vx) > MAX_LANDING_SPEED_H) {
                statusEl.innerHTML = 'STATUS: <span class="danger">HANCUR! Kecepatan impact terlalu tinggi.</span>';
                return;
            }

            if (degree > MAX_LANDING_ANGLE) {
                statusEl.innerHTML = 'STATUS: <span class="danger">HANCUR! Orientasi terlalu miring (Terguling).</span>';
                return;
            }

            statusEl.innerHTML = 'STATUS: <span class="success">PENDARATAN SEMPURNA! Kerja bagus, Komandan.</span>';
        }

        function updateUI(reset = false) {
            let deg = (lander.angle * (180 / Math.PI)) % 360;
            document.getElementById('v-speed').innerText = lander.vy.toFixed(2);
            document.getElementById('h-speed').innerText = lander.vx.toFixed(2);
            document.getElementById('angle-disp').innerText = Math.round(deg);
            document.getElementById('fuel-disp').innerText = Math.max(0, lander.fuel).toFixed(1);
            
            let vSpeedEl = document.getElementById('v-speed');
            vSpeedEl.className = lander.vy > MAX_LANDING_SPEED_V ? 'danger' : 'success';
            
            if (reset) document.getElementById('status').innerHTML = 'STATUS: <span class="highlight">NOMINAL</span>';
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gambar Bintang
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            });

            // Gambar Medan
            ctx.strokeStyle = '#45a29e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(terrain[0].x, terrain[0].y);
            for (let i = 1; i < terrain.length; i++) {
                ctx.lineTo(terrain[i].x, terrain[i].y);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.closePath();
            
            // Isi warna medan
            ctx.fillStyle = '#1f2833';
            ctx.fill();
            ctx.stroke();

            // Highlight Landing Pad
            ctx.fillStyle = '#66fcf1';
            ctx.fillRect(padX, getSurfaceY(padX) - 2, padWidth, 4);
            ctx.shadowBlur = 15; ctx.shadowColor = '#66fcf1';
            ctx.fillRect(padX, getSurfaceY(padX) - 2, padWidth, 4);
            ctx.shadowBlur = 0;

            // Gambar Partikel (Exhaust)
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 179, 71, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI*2); ctx.fill();
            });

            // Gambar Modul Pendarat (Membutuhkan Translasi & Rotasi Canvas)
            ctx.save();
            ctx.translate(lander.x, lander.y);
            ctx.rotate(lander.angle);

            // Badan utama
            ctx.fillStyle = '#c5c6c7';
            ctx.fillRect(-lander.width/2, -lander.height/2, lander.width, lander.height);
            // Kaki pendarat
            ctx.fillStyle = '#66fcf1';
            ctx.fillRect(-lander.width/2 - 4, lander.height/2, 4, 6);
            ctx.fillRect(lander.width/2, lander.height/2, 4, 6);
            // Kokpit
            ctx.fillStyle = '#121820';
            ctx.fillRect(-5, -lander.height/2 + 4, 10, 8);

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        initGame();
        loop();
    </script>
</body>
</html>
